ascend:
  driver:
    version:
      expected:
        type: "ge"
        value: "Version(25.0)"
      reason: 升级到最新的驱动可以提升性能
      severity: "high"

env:
  OMP_PROC_BIND:
    expected:
      type: eq
      value: "false"
    reason: "OpenMP多线程绑核配置性能"
    severity: low
  OMP_NUM_THREADS:
    expected:
      type: eq
      value: "10"
    reason: "OpenMP多线程绑核配置性能"
    severity: low
  PYTORCH_NPU_ALLOC_CONF:
    expected:
      type: eq
      value: "expandable_segments:True"
    reason: "OpenMP多线程绑核配置性能"
    severity: low
  HCCL_BUFFSIZE:
    expected:
      type: eq
      value: "1024"
    reason: "HCCL通信缓存，PD分离场景，P节点设置为512，D节点设置为1024"
    severity: high
  TASK_QUEUE_ENABLE:
    expected:
      type: eq
      value: "1"
    reason: "单队列模式"
    severity: low
  VLLM_USE_V1:
    expected:
      type: eq
      value: "1"
    reason: "VLLM V1 engine开关，不配置默认走V0"
    severity: high
  VLLM_WORKER_MULTIPROC_METHOD:
    expected:
      type: eq
      value: "fork"
    reason: "PD分离场景下必要"
    severity: high
  VLLM_ASCEND_EXTERNAL_DP_LB_ENABLED:
    expected:
      type: eq
      value: "1"
    reason: "分布式DP开关，不设置默认使用原生DP，性能相关"
    severity: low