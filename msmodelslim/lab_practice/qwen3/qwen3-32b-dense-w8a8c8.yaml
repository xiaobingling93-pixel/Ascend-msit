apiversion: modelslim_v1
metadata:
  config_id: qwen3-32b-dense-w8a8c8
  score: 90
  verified_model_types:
    - Qwen3-32B
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: True
spec:
  process:
    - type: "kv_smooth"
      smooth_factor: 1.0
    - type: "linear_quant"
      qconfig:
        act:
          scope: "per_tensor"   # default is per_tensor
          dtype: "int8"        # default is int8
          symmetric: False      # default is True
          method: "minmax"      # default is minmax
        weight:
          scope: "per_channel"   # default is per_channel
          dtype: "int8"        # default is int8
          symmetric: True       # default is True
          method: "minmax"      # default is minmax
      include: ["*"]
      exclude: ["*down_proj*"]
    - type: "dynamic_cache" 
      qconfig:
        scope: "per_channel"
        dtype: "int8" 
        symmetric: True 
        method: "minmax"
      include: 
        - "*"
  save:
    - type: "ascendv1_saver"
      part_file_size: 4
  dataset: "qwen3_cot.json"