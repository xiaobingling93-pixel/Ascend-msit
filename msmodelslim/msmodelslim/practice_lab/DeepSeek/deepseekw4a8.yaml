      "model.layers.[012].mlp.up_proj": "w8a8_dynamic"
      "model.layers.[0-9]*.self_attn.*": "w8a8"
      "model.layers.[0-9]*.mlp.shared_experts.*": "w8a8_dynamic"
      "model.layers.[0-9]*.mlp.experts.*": "w4a8_dynamic"





